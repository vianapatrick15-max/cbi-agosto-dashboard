<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBI · Agosto Solidário — Performance</title>
<style>
  :root{
    --purple:#7961f4; --purple-d:#6b52e6; --purple-dd:#6456df;
    --ink:#352d62; --text:#1c1830; --muted:#6b7280;
    --line:#e7e4f2; --bg:#f3f1fa; --card:#fff; --soft:#f6f5fc; --lav:#f0eef7;
    --cyan:#0edfe3;
    --good:#48ad6e; --good-bg:#e6f6ee; --warn:#d98a1f; --warn-bg:#fcf3e2; --bad:#e0396b; --bad-bg:#fbe7ef;
    --ins:#7961f4; --inv:#0e9aa0; --cum:#352d62;
    --accent:#7961f4;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--bg);color:var(--text);line-height:1.45;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1180px;margin:0 auto;padding:24px 20px 60px}
  header{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px;
    border-bottom:2px solid var(--purple);padding-bottom:16px;margin-bottom:18px}
  .ttl .kick{font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--purple-d)}
  .ttl h1{font-size:27px;font-weight:800;color:var(--ink);letter-spacing:-.01em;margin-top:2px}
  .ttl .sub{font-size:13px;color:var(--muted);margin-top:3px}
  .count{text-align:right}
  .count .big{font-size:32px;font-weight:800;color:var(--purple);line-height:1}
  .count .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:4px}
  .controls{display:flex;flex-wrap:wrap;gap:14px;align-items:center;background:var(--card);
    border:1px solid var(--line);border-radius:13px;padding:12px 16px;margin-bottom:22px}
  .controls .clab{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .chips{display:flex;gap:6px;flex-wrap:wrap}
  .chip{font-size:12.5px;font-weight:600;padding:6px 13px;border-radius:20px;border:1px solid var(--line);
    background:var(--lav);color:var(--muted);cursor:pointer;user-select:none;transition:all .12s}
  .chip:hover{border-color:var(--purple);color:var(--purple-d)}
  .chip.on{background:var(--purple);border-color:var(--purple);color:#fff}
  .dates{display:flex;gap:7px;align-items:center;font-size:12.5px;color:var(--muted);margin-left:auto;flex-wrap:wrap}
  .dates input{font:inherit;font-size:12.5px;padding:5px 8px;border:1px solid var(--line);border-radius:8px;color:var(--text);background:var(--card)}
  .seclab{font-size:11px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;
    color:var(--muted);margin:30px 0 13px;display:flex;align-items:center;gap:10px}
  .seclab:before{content:"";width:20px;height:2px;background:var(--purple);border-radius:2px}
  .seclab .n{width:19px;height:19px;border-radius:50%;background:var(--purple);color:#fff;font-size:11px;
    display:inline-flex;align-items:center;justify-content:center;font-weight:800}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}
  @media(max-width:820px){.grid{grid-template-columns:1fr 1fr}}
  @media(max-width:520px){.grid{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:16px 18px;position:relative;overflow:hidden}
  .card.hero:before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--purple)}
  .card .k{font-size:11.5px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .card .v{font-size:26px;font-weight:800;color:var(--text);margin:6px 0 2px;letter-spacing:-.01em}
  .card.hero .v{color:var(--ink)}
  .card .meta{font-size:12px;color:var(--muted)}
  .card .meta b{color:var(--text)}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:18px 20px}
  .panel h3{font-size:14px;font-weight:800;color:var(--ink);margin-bottom:3px}
  .panel h3 small{font-weight:600;color:var(--purple);font-size:12px;text-transform:none;letter-spacing:0}
  .panel .hint{font-size:12px;color:var(--muted);margin-bottom:16px}
  .charts2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  @media(max-width:820px){.charts2{grid-template-columns:1fr}}
  svg{display:block;width:100%;height:auto;overflow:visible}
  .legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-top:12px}
  .legend span{display:flex;align-items:center;gap:6px}
  .legend i{width:11px;height:11px;border-radius:3px;display:inline-block}
  .legend i.ln{width:16px;height:3px;border-radius:2px}
  /* perfil / breakdown bars */
  .brk{display:flex;flex-direction:column;gap:9px}
  .brow{display:flex;align-items:center;gap:12px}
  .brow .bl{flex:0 0 172px;font-size:13px;font-weight:600;color:var(--text)}
  .brow .bl small{display:block;font-size:10.5px;color:var(--muted);font-weight:500}
  .brow .bb{flex:1;height:32px;background:var(--lav);border-radius:8px;position:relative;overflow:hidden}
  .brow .bb > i{position:absolute;left:0;top:0;bottom:0;border-radius:8px;
    background:linear-gradient(90deg,var(--purple-d),var(--purple));display:flex;align-items:center;
    justify-content:flex-end;padding-right:11px;color:#fff;font-size:12.5px;font-weight:800;min-width:38px}
  .brow .bpct{flex:0 0 64px;text-align:right;font-size:12.5px;color:var(--muted)}
  .brow .bpct b{color:var(--ink);font-weight:800}
  /* donut origem */
  .donut{max-width:210px;margin:2px auto 0}
  .dlegend{display:flex;flex-direction:column;gap:8px;margin-top:16px}
  .dlrow{display:flex;align-items:center;gap:9px;font-size:13px}
  .dlrow .sw{width:12px;height:12px;border-radius:3px;flex:0 0 auto}
  .dlrow .nm{flex:1;color:var(--text);font-weight:600}
  .dlrow .vl{color:var(--text);font-weight:800}
  .dlrow .vl small{color:var(--muted);font-weight:600;font-size:11px;margin-left:3px}
  .fnote{background:var(--lav);border:1px solid var(--line);border-left:4px solid var(--purple);
    border-radius:10px;padding:11px 14px;margin-top:15px;font-size:12px;color:#4a4463}
  .fnote b{color:var(--ink)}
  .tblwrap{overflow-x:auto;border:1px solid var(--line);border-radius:13px;background:var(--card)}
  table.ads{width:100%;border-collapse:collapse;min-width:560px}
  table.ads th,table.ads td{padding:11px 14px;text-align:right;font-size:13px;border-bottom:1px solid var(--line);white-space:nowrap}
  table.ads th{background:var(--ink);color:#fff;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.03em;cursor:pointer;user-select:none}
  table.ads th.l,table.ads td.l{text-align:left}
  table.ads th:hover{background:var(--purple-d)}
  table.ads tbody tr:last-child td{border-bottom:0}
  table.ads tbody tr:hover{background:var(--soft)}
  table.ads tr.tot td{background:var(--lav);font-weight:800;border-top:2px solid var(--line)}
  table.ads td.adname{font-weight:700;color:var(--text);max-width:320px;overflow:hidden;text-overflow:ellipsis}
  .pill{font-size:11px;font-weight:800;padding:2px 8px;border-radius:20px;display:inline-block}
  .pill.g{background:var(--good-bg);color:var(--good)} .pill.w{background:var(--warn-bg);color:var(--warn)} .pill.b{background:var(--bad-bg);color:var(--bad)}
  .tipbox{position:fixed;pointer-events:none;background:var(--ink);color:#fff;font-size:11.5px;
    padding:7px 10px;border-radius:8px;line-height:1.55;white-space:nowrap;z-index:50;display:none;
    box-shadow:0 4px 14px rgba(53,45,98,.28)}
  .tipbox b{font-weight:700}
  .empty{background:var(--card);border:1px dashed var(--line);border-radius:13px;padding:40px 24px;text-align:center;color:var(--muted);font-size:13.5px}
  footer{margin-top:38px;padding-top:14px;border-top:1px solid var(--line);
    font-size:12px;color:var(--muted);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
</style>
</head>

/* ============ helpers ============ */
const $ = s => document.querySelector(s);
const tip = $('#tip');
function el(t,c,h){const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;}
const BRL = n => 'R$ '+(n||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const BRL0 = n => 'R$ '+Math.round(n||0).toLocaleString('pt-BR');
const N = n => (n||0).toLocaleString('pt-BR');
const PCT = n => (n||0).toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1})+'%';
const brdate = d => {const [y,m,dd]=d.split('-');return dd+'/'+m;};
const brdatef = d => {const [y,m,dd]=d.split('-');return dd+'/'+m+'/'+y;};
function showTip(ev,html){tip.innerHTML=html;tip.style.display='block';moveTip(ev);}
function moveTip(ev){const p=12;let x=ev.clientX+p,y=ev.clientY+p;const r=tip.getBoundingClientRect();
  if(x+r.width>innerWidth)x=ev.clientX-r.width-p;if(y+r.height>innerHeight)y=ev.clientY-r.height-p;
  tip.style.left=x+'px';tip.style.top=y+'px';}
function hideTip(){tip.style.display='none';}
function enumDays(from,to){const out=[];let d=new Date(from+'T00:00:00');const e=new Date(to+'T00:00:00');
  let g=0;while(d<=e&&g<3000){out.push(d.toISOString().slice(0,10));d.setDate(d.getDate()+1);g++;}return out;}

/* ============ state ============ */
let FROM=RAW.data_from, TO=RAW.data_to;
function inRange(d){return d>=FROM && d<=TO;}

/* ============ compute ============ */
function agg(){
  const dv=RAW.deliv.filter(x=>inRange(x.d));
  const ld=RAW.leads.filter(x=>inRange(x.d));
  const spend=dv.reduce((a,x)=>a+x.s,0);
  const spendGoogle=dv.filter(x=>x.ch==='google').reduce((a,x)=>a+x.s,0);
  const spendMeta=spend-spendGoogle;
  const leads=ld.length;
  const leadsMeta=ld.filter(x=>x.ch==='meta').length;
  const leadsGoogle=ld.filter(x=>x.ch==='google').length;
  const leadsPaid=ld.filter(x=>x.p===1).length;
  const leadsOrg=leads-leadsPaid;
  return {dv,ld,spend,spendMeta,spendGoogle,leads,leadsMeta,leadsGoogle,leadsPaid,leadsOrg,
    cpl: leads?spend/leads:0,
    cplPaid: leadsPaid?spend/leadsPaid:0,
    cplMeta: leadsMeta?spendMeta/leadsMeta:0,
    cplGoogle: leadsGoogle?spendGoogle/leadsGoogle:0};
}

  const cards=[

    ['','Leads (total)',N(o.leads),`pagos + orgânicos`],
    ['','CPL (total)',o.leads?BRL(o.cpl):'—','investimento ÷ leads'],
    ['','Leads pagos',N(o.leadsPaid),`${PCT(pctP)} do total`],
    ['','Leads orgânicos',N(o.leadsOrg),`${PCT(pctO)} do total`],
    ['hero','CPL pago (blend)',o.leadsPaid?BRL(o.cplPaid):'—','Meta + Google ÷ leads pagos'],
  ];
  cards.forEach(([cl,k,v,m])=>{
    const c=el('div','card '+cl);
    c.appendChild(el('div','k',k));c.appendChild(el('div','v',v));c.appendChild(el('div','meta',m));
    g.appendChild(c);
  });
  box.appendChild(g);
  // ---- por canal pago (Meta x Google) ----
  const t=el('div',null,'Investimento por canal pago');
  t.style.cssText='font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:20px 0 11px';
  box.appendChild(t);
  const g2=el('div','grid');
  [['Meta Ads',o.spendMeta,o.leadsMeta,o.cplMeta,'#7961f4'],
   ['Google Ads',o.spendGoogle,o.leadsGoogle,o.cplGoogle,'#48ad6e']].forEach(([nm,sp,lp,cp,col])=>{
    const c=el('div','card');
    c.style.borderLeft='4px solid '+col;

    g2.appendChild(c);
  });
  box.appendChild(g2);
  return box;
}

/* ============ section 2 — origem + perfil dos leads ============ */
// mapa UTM Source -> canal. Cada UTM clara vira sua propria fatia (nada de "Outros"):
// origens desconhecidas nao-vazias aparecem com o rotulo cru da UTM.
const META_SRC=['ig','fb','meta','meta_ads','meta-ads','instagram','facebook','facebook_ads','instagram_ads','ig_ads'];
const GOOGLE_SRC=['dgen_ads','search_ads','google_ads','google-ads','google','gads'];
const SRC_LABEL={social:'Social',whatsapp_grupos:'WhatsApp Grupos',whatsapp:'WhatsApp Grupos',
  parceiro:'Parceiro',diagnosticocbi:'Diagnóstico CBI',direto:'Direto',direct:'Direto',
  hs_automation:'Automação (HubSpot)'};
function originOf(src){
  src=(src||'').toLowerCase().trim();
  if(META_SRC.includes(src))return'Meta Ads';
  if(GOOGLE_SRC.includes(src))return'Google Ads';
  if(src===''||src==='(sem origem)'||src==='(vazio)')return'Sem origem';
  return SRC_LABEL[src]||src;   // mapeia tudo; UTM clara nunca cai em "Outros"
}
const ORIGIN_COLOR={'Meta Ads':'#7961f4','Google Ads':'#48ad6e','Social':'#0e9aa0',
  'WhatsApp Grupos':'#25b36b','Parceiro':'#e0a020','Diagnóstico CBI':'#d94f9c',
  'Direto':'#5b6b8c','Automação (HubSpot)':'#9a7fd0','Sem origem':'#b8b2cc'};
const ORIGIN_PALETTE=['#8a7fd0','#e07a5f','#3aa0b8','#c0a04a','#a05fd0','#6ab04c','#d0708f'];

function svgDonut(items,total){
  const cx=90,cy=90,r=62,sw=27;
  const polar=deg=>{const a=(deg-90)*Math.PI/180;return[cx+r*Math.cos(a),cy+r*Math.sin(a)];};
  let acc=0,s=`<svg class="donut" viewBox="0 0 180 180">`;
  s+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--lav)" stroke-width="${sw}"/>`;
  items.forEach(it=>{
    const frac=total?it.c/total:0; if(frac<=0)return;
    const a0=acc*360,a1=(acc+frac)*360; acc+=frac;
    const tipd=`${it.name}|${N(it.c)} leads|${PCT(frac*100)} do total`;
    if(frac>=0.9999){
      s+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${it.color}" stroke-width="${sw}" data-tip="${tipd}" style="cursor:pointer"/>`;
    }else{
      const[x0,y0]=polar(a0),[x1,y1]=polar(a1),large=(a1-a0)>180?1:0;
      s+=`<path d="M ${x0.toFixed(2)} ${y0.toFixed(2)} A ${r} ${r} 0 ${large} 1 ${x1.toFixed(2)} ${y1.toFixed(2)}" fill="none" stroke="${it.color}" stroke-width="${sw}" data-tip="${tipd}" style="cursor:pointer"/>`;
    }
  });
  s+=`<text x="${cx}" y="${cy-1}" text-anchor="middle" font-size="27" font-weight="800" fill="var(--ink)">${N(total)}</text>`;
  s+=`<text x="${cx}" y="${cy+17}" text-anchor="middle" font-size="11" font-weight="600" fill="var(--muted)">leads</text>`;
  s+=`</svg>`; return s;
}

function origemPanel(o){
  const p=el('div','panel');
  p.appendChild(el('h3','Origem dos leads <small>(por canal)</small>'));
  p.appendChild(el('div','hint','Leads no período pela origem (UTM Source). Meta Ads = Instagram + Facebook pagos; Google Ads = dgen + search; cada origem clara aparece separada.'));
  const m={};
  o.ld.forEach(x=>{const name=originOf(x.src);m[name]=(m[name]||0)+1;});
  let pi=0;
  const items=Object.entries(m).map(([name,c])=>({name,c}))
    .sort((a,b)=>b.c-a.c)
    .map(it=>({...it,color:ORIGIN_COLOR[it.name]||ORIGIN_PALETTE[pi++%ORIGIN_PALETTE.length]}));
  const total=items.reduce((a,x)=>a+x.c,0);
  if(!total){p.appendChild(el('div','empty','Sem leads no período.'));return p;}
  p.appendChild(el('div',null,svgDonut(items,total)));
  let leg='<div class="dlegend">';
  items.forEach(it=>{const pct=total?it.c/total*100:0;
    leg+=`<div class="dlrow"><span class="sw" style="background:${it.color}"></span><span class="nm">${it.name}</span><span class="vl">${N(it.c)}<small>${PCT(pct)}</small></span></div>`;});
  leg+='</div>';
  p.appendChild(el('div',null,leg));
  return p;
}

function leadsSection(o){
  const box=el('div');
  box.appendChild(el('div','seclab','<span class="n">2</span> Origem e perfil dos leads'));
  const wrap=el('div','charts2');
  wrap.appendChild(origemPanel(o));
  wrap.appendChild(perfilPanel(o));
  box.appendChild(wrap);
  return box;
}

function perfilPanel(o){
  const p=el('div','panel');
  p.appendChild(el('h3','Perfil por tipo de contato <small>(quem se inscreveu)</small>'));
  p.appendChild(el('div','hint','Leads no período agrupados pela profissão informada no cadastro. Barra = quantidade · à direita: % do total com tipo informado.'));
  // agrega
  const m={};let semTipo=0;
  o.ld.forEach(x=>{const t=(x.tp||'').trim();if(!t){semTipo++;return;}(m[t]=m[t]||0);m[t]+=1;});
  const rows=Object.entries(m).map(([t,c])=>({t,c})).sort((a,b)=>b.c-a.c);
  const totalT=rows.reduce((a,x)=>a+x.c,0);
  if(!rows.length){p.appendChild(el('div','empty','Sem tipo de contato informado no período.'));return p;}
  const top=Math.max(1,rows[0].c);
  const brk=el('div','brk');
  rows.forEach(r=>{
    const pct=totalT?r.c/totalT*100:0;
    const row=el('div','brow');
    row.appendChild(el('div','bl',r.t));
    const bar=el('div','bb');
    const fill=el('i',null,N(r.c));
    fill.style.width=Math.max(5,r.c/top*100)+'%';
    bar.appendChild(fill);
    row.appendChild(bar);
    row.appendChild(el('div','bpct',`<b>${PCT(pct)}</b>`));
    fill.onmousemove=ev=>showTip(ev,`<b>${r.t}</b><br>Leads: <b>${N(r.c)}</b><br>${PCT(pct)} dos leads com tipo`);
    fill.onmouseleave=hideTip;
    brk.appendChild(row);
  });
  p.appendChild(brk);
  const lead0=rows[0];
  p.appendChild(el('div','fnote',
    `Público predominante: <b>${lead0.t}</b> (${N(lead0.c)} leads · ${PCT(totalT?lead0.c/totalT*100:0)}). `+
    (semTipo?`<b>${N(semTipo)}</b> lead(s) sem tipo informado ficam fora deste recorte.`:'')));
  return p;
}

/* ============ section 3 — evolução por dia (igual print) ============ */
function daySeries(from,to,filtered){
  const map={};
  RAW.deliv.forEach(x=>{if(filtered&&!inRange(x.d))return;if(x.d<from||x.d>to)return;(map[x.d]=map[x.d]||{s:0,l:0}).s+=x.s;});
  RAW.leads.forEach(x=>{if(filtered&&!inRange(x.d))return;if(x.d<from||x.d>to)return;(map[x.d]=map[x.d]||{s:0,l:0}).l+=1;});
  return enumDays(from,to).map(d=>({d,s:(map[d]||{}).s||0,l:(map[d]||{}).l||0}));
}
function xticks(n){return Math.max(1,Math.ceil(n/7));}

// esquerda — inscritos acumulados (SEMPRE periodo completo, todas as origens)
function svgCumulative(){
  const series=daySeries(RAW.data_from,RAW.data_to,false);
  let acc=0;const cum=series.map(x=>{acc+=x.l;return {d:x.d,c:acc};});
  const W=560,H=250,pl=40,pr=18,pt=22,pbb=34;
  const iw=W-pl-pr, ih=H-pt-pbb;
  const maxC=Math.max(1,...cum.map(x=>x.c));
  const n=cum.length;
  const X=i=> n<=1?pl+iw/2 : pl+iw*i/(n-1);
  const Y=v=> pt+ih - v/maxC*ih;
  let s=`<svg viewBox="0 0 ${W} ${H}">`;
  for(let gi=0;gi<=4;gi++){const y=pt+ih-ih*gi/4;
    s+=`<line x1="${pl}" y1="${y}" x2="${W-pr}" y2="${y}" stroke="#ece9f6"/>`;
    s+=`<text x="${pl-6}" y="${y+3}" text-anchor="end" font-size="10" fill="#9a93b0">${Math.round(maxC*gi/4)}</text>`;}
  const line=cum.map((x,i)=>`${X(i)},${Y(x.c)}`).join(' ');
  s+=`<polygon points="${pl},${pt+ih} ${line} ${X(n-1)},${pt+ih}" fill="var(--purple)" opacity=".10"/>`;
  s+=`<polyline points="${line}" fill="none" stroke="var(--cum)" stroke-width="2.5"/>`;
  const te=xticks(n);
  cum.forEach((x,i)=>{
    s+=`<circle cx="${X(i)}" cy="${Y(x.c)}" r="${n>18?2.5:3.5}" fill="#fff" stroke="var(--cum)" stroke-width="2"
       data-tip="${brdatef(x.d)}|${x.c} inscritos acumulados" style="cursor:pointer"/>`;
    if(i%te===0||i===n-1)s+=`<text x="${X(i)}" y="${H-12}" text-anchor="middle" font-size="10" fill="#9a93b0">${brdate(x.d)}</text>`;
  });
  const lastX=X(n-1),lastY=Y(cum[n-1].c);
  s+=`<text x="${Math.min(lastX,W-pr-4)}" y="${lastY-9}" text-anchor="end" font-size="13" font-weight="800" fill="var(--ink)">${N(cum[n-1].c)}</text>`;
  s+=`</svg>`;return s;
}

// direita — barras inscritos/dia + linha investido/dia (respeita filtro)
function svgComboBars(){
  const series=daySeries(FROM,TO,true);
  const W=560,H=250,pl=40,pr=44,pt=22,pb=34;
  const iw=W-pl-pr, ih=H-pt-pb;
  const maxL=Math.max(1,...series.map(x=>x.l));
  const maxS=Math.max(1,...series.map(x=>x.s));
  const n=series.length||1;
  const step=iw/n;
  const bw=Math.min(46,step*0.6);
  let s=`<svg viewBox="0 0 ${W} ${H}">`;
  for(let gi=0;gi<=4;gi++){const y=pt+ih-ih*gi/4;
    s+=`<line x1="${pl}" y1="${y}" x2="${W-pr}" y2="${y}" stroke="#ece9f6"/>`;
    s+=`<text x="${pl-6}" y="${y+3}" text-anchor="end" font-size="10" fill="#9a93b0">${Math.round(maxL*gi/4)}</text>`;
    s+=`<text x="${W-pr+6}" y="${y+3}" text-anchor="start" font-size="10" fill="var(--inv)">${Math.round(maxS*gi/4)}</text>`;}
  // barras inscritos
  series.forEach((x,i)=>{const cx=pl+step*i+step/2;const h=x.l/maxL*ih;const y=pt+ih-h;
    s+=`<rect x="${cx-bw/2}" y="${y}" width="${bw}" height="${h}" rx="4" fill="var(--ins)"
       data-tip="${brdatef(x.d)}|${x.l} inscritos|${BRL(x.s)} investido" style="cursor:pointer"/>`;
    if(x.l>0)s+=`<text x="${cx}" y="${y-5}" text-anchor="middle" font-size="10.5" font-weight="800" fill="var(--purple-d)">${x.l}</text>`;});
  // linha investido
  const pts=series.map((x,i)=>[pl+step*i+step/2, pt+ih-(x.s/maxS*ih)]);
  if(pts.length>1)s+=`<polyline points="${pts.map(p=>p.join(',')).join(' ')}" fill="none" stroke="var(--inv)" stroke-width="2.5"/>`;
  pts.forEach((p,i)=>{s+=`<circle cx="${p[0]}" cy="${p[1]}" r="3.5" fill="#fff" stroke="var(--inv)" stroke-width="2"
     data-tip="${brdatef(series[i].d)}|${series[i].l} inscritos|${BRL(series[i].s)} investido" style="cursor:pointer"/>`;});
  const te=xticks(n);
  series.forEach((x,i)=>{if(i%te===0||i===n-1){const cx=pl+step*i+step/2;
    s+=`<text x="${cx}" y="${H-12}" text-anchor="middle" font-size="10" fill="#9a93b0">${brdate(x.d)}</text>`;}});
  s+=`</svg>`;return s;
}
function evolution(){
  const box=el('div');
  box.appendChild(el('div','seclab','<span class="n">3</span> Evolução por dia'));
  const wrap=el('div','charts2');
  const p1=el('div','panel');
  p1.appendChild(el('h3','Inscritos acumulados <small>(sempre o período completo)</small>'));
  p1.appendChild(el('div','hint','Total de inscritos acumulado dia a dia (todas as origens).'));
  p1.appendChild(el('div',null,svgCumulative()));
  const p2=el('div','panel');
  p2.appendChild(el('h3','Inscritos e investimento por dia'));
  p2.appendChild(el('div','hint','Barras = inscritos no dia · linha = investido no dia.'));
  p2.appendChild(el('div',null,svgComboBars()));
  p2.appendChild(el('div','legend','<span><i style="background:var(--ins)"></i>Inscritos</span><span><i class="ln" style="background:var(--inv)"></i>R$ investido</span>'));
  wrap.appendChild(p1);wrap.appendChild(p2);
  box.appendChild(wrap);
  return box;
}

/* ============ section 4 — anúncios ============ */
let SORT={k:'leads',dir:-1};
function adsAgg(o){
  const m={};
  o.dv.filter(x=>x.ch!=='google').forEach(x=>{const k=x.ad;(m[k]=m[k]||{ad:k,s:0,i:0,c:0,lpv:0,leads:0}).s+=x.s;m[k].i+=x.i;m[k].c+=x.c;m[k].lpv+=(x.lpv||0);});
  // apenas anuncios pagos Meta: so leads Meta atribuidos a um anuncio real que existe na entrega
  // (descarta Google — nivel campanha, sem LPV —, organico, "(sem atribuicao)" e ids sem criativo)
  o.ld.forEach(x=>{if(x.p!==1||x.ch!=='meta')return;const k=x.ct;if(!m[k])return;m[k].leads+=1;});
  // ctr = cliques no link / impressões · connect rate = LPV / cliques · cpm = custo/mil impr · cpc = custo/clique · tx = leads/LPV
  return Object.values(m).map(a=>({...a,
    ctr:a.i?a.c/a.i*100:0, connect:a.c?a.lpv/a.c*100:0, cpl:a.leads?a.s/a.leads:0,
    cpm:a.i?a.s/a.i*1000:0, cpc:a.c?a.s/a.c:0, tx:a.lpv?a.leads/a.lpv*100:0}));
}
function ads(o){
  const box=el('div');
  box.appendChild(el('div','seclab','<span class="n">4</span> Anúncios · performance'));
  box.appendChild(el('div',null,'<div style="font-size:12px;color:var(--muted);margin:-4px 0 13px">Apenas anúncios pagos (Meta) · leads pagos atribuídos por UTM Content. CPM = custo/mil impressões · CPC = investido ÷ cliques · Connect rate = visitas ÷ cliques.</div>'));
  const rows=adsAgg(o);
  if(!rows.length){box.appendChild(el('div','empty','Sem anúncios no período.'));return box;}
  rows.sort((a,b)=>(a[SORT.k]<b[SORT.k]?-1:a[SORT.k]>b[SORT.k]?1:0)*SORT.dir);
  const cols=[['ad','Anúncio','l'],['s','Investimento'],['leads','Leads'],['cpl','CPL'],['i','Impressões'],['cpm','CPM'],['ctr','CTR'],['cpc','CPC'],['connect','Connect rate']];
  const tot=rows.reduce((a,x)=>{a.s+=x.s;a.i+=x.i;a.c+=x.c;a.lpv+=x.lpv;a.leads+=x.leads;return a;},{s:0,i:0,c:0,lpv:0,leads:0});
  tot.ctr=tot.i?tot.c/tot.i*100:0;tot.connect=tot.c?tot.lpv/tot.c*100:0;tot.cpl=tot.leads?tot.s/tot.leads:0;
  tot.cpm=tot.i?tot.s/tot.i*1000:0;tot.cpc=tot.c?tot.s/tot.c:0;tot.tx=tot.lpv?tot.leads/tot.lpv*100:0;
  const cplAvg=tot.cpl;
  let h='<div class="tblwrap"><table class="ads"><thead><tr>';
  cols.forEach(([k,l,cl])=>{h+=`<th class="${cl||''}" data-k="${k}">${l}${SORT.k===k?(SORT.dir<0?' ▾':' ▴'):''}</th>`;});
  h+='</tr></thead><tbody>';
  rows.forEach(a=>{
    h+='<tr>';
    cols.forEach(([k])=>{
      if(k==='ad')h+=`<td class="l adname">${a.ad}</td>`;
      else if(k==='leads')h+=`<td>${N(a.leads)}</td>`;
      else if(k==='s')h+=`<td>${BRL(a.s)}</td>`;
      else if(k==='i')h+=`<td>${N(a.i)}</td>`;
      else if(k==='cpm')h+=`<td>${a.i?BRL(a.cpm):'—'}</td>`;
      else if(k==='ctr')h+=`<td>${PCT(a.ctr)}</td>`;
      else if(k==='cpc')h+=`<td>${a.c?BRL(a.cpc):'—'}</td>`;
      else if(k==='connect')h+=`<td>${PCT(a.connect)}</td>`;
      else if(k==='cpl'){
        const has=a.leads&&a.s>0;let pill='';
        if(has){const cls=a.cpl<=cplAvg?'g':a.cpl<=cplAvg*1.4?'w':'b';pill=` <span class="pill ${cls}">${a.cpl<=cplAvg?'ok':a.cpl<=cplAvg*1.4?'~':'alto'}</span>`;}
        h+=`<td>${has?BRL(a.cpl):'—'}${pill}</td>`;
      }
    });
    h+='</tr>';
  });
  h+='<tr class="tot">';
  cols.forEach(([k])=>{
    if(k==='ad')h+=`<td class="l">Total (${rows.length})</td>`;
    else if(k==='leads')h+=`<td>${N(tot.leads)}</td>`;
    else if(k==='s')h+=`<td>${BRL(tot.s)}</td>`;
    else if(k==='i')h+=`<td>${N(tot.i)}</td>`;
    else if(k==='cpm')h+=`<td>${tot.i?BRL(tot.cpm):'—'}</td>`;
    else if(k==='cpl')h+=`<td>${tot.leads?BRL(tot.cpl):'—'}</td>`;
    else if(k==='ctr')h+=`<td>${PCT(tot.ctr)}</td>`;
    else if(k==='cpc')h+=`<td>${tot.c?BRL(tot.cpc):'—'}</td>`;
    else if(k==='connect')h+=`<td>${PCT(tot.connect)}</td>`;
  });
  h+='</tr></tbody></table></div>';
  const w=el('div',null,h);
  w.querySelectorAll('th').forEach(th=>th.onclick=()=>{const k=th.dataset.k;
    if(SORT.k===k)SORT.dir*=-1;else{SORT.k=k;SORT.dir=(k==='ad')?1:-1;}render();});
  box.appendChild(w);
  return box;
}

/* ============ tooltips for svg ============ */
function bindTips(scope){
  scope.querySelectorAll('[data-tip]').forEach(n=>{
    n.onmousemove=ev=>{const parts=n.dataset.tip.split('|');
      showTip(ev,'<b>'+parts[0]+'</b>'+parts.slice(1).map(p=>'<br>'+p).join(''));};
    n.onmouseleave=hideTip;
  });
}

/* ============ render ============ */
function render(){
  const o=agg();
  $('#hspend').textContent=BRL0(o.spend);
  $('#sub').textContent=`Campanha ${RAW.campaign||'Agosto Solidário'} · ${brdatef(FROM)} a ${brdatef(TO)}`;
  const v=$('#view');v.innerHTML='';
  v.appendChild(kpis(o));
  v.appendChild(leadsSection(o));
  v.appendChild(evolution());
  v.appendChild(ads(o));
  bindTips(v);
  $('#foot-upd').textContent='Atualizado '+brdatef(RAW.today)+' · dados '+brdatef(RAW.data_from)+' a '+brdatef(RAW.data_to);
  $('#dfrom').value=FROM;$('#dto').value=TO;
}

/* ============ controls ============ */
function setChip(p){document.querySelectorAll('#chips .chip').forEach(c=>c.classList.toggle('on',c.dataset.p===p));}
function applyPreset(p){
  const to=RAW.data_to;
  if(p==='tudo'){FROM=RAW.data_from;TO=RAW.data_to;}
  else{const days=parseInt(p);const d=new Date(to+'T00:00:00');d.setDate(d.getDate()-(days-1));
    FROM=d.toISOString().slice(0,10);TO=to;if(FROM<RAW.data_from)FROM=RAW.data_from;}
  setChip(p);render();
}
document.querySelectorAll('#chips .chip').forEach(c=>c.onclick=()=>applyPreset(c.dataset.p));
$('#dfrom').onchange=e=>{FROM=e.target.value;setChip('');render();};
$('#dto').onchange=e=>{TO=e.target.value;setChip('');render();};

render();
</script>
